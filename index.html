<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="theme-color" content="#f2e8d5"/>
<title>猜字乐</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&family=Ma+Shan+Zheng&display=swap" rel="stylesheet"/>
<style>
:root{
  --fs:1;
  /* Literary palette */
  --p:#f2e8d5;--p2:#e8d9bc;--ink:#1c1008;--im:rgba(28,16,8,0.42);
  --red:#8b1a1a;--rs:#f5e0e0;--grn:#1a4a2e;--gs:#dff0e8;--gld:#7a5c10;--gl:#f5ead0;
  --bd:rgba(28,16,8,0.13);--sh:rgba(28,16,8,0.09);--r:14px;
  /* History / Imperial palette */
  --him:#1a0a00;--hbg:#1c0a04;--hbg2:#2d1206;
  --hred:#c0392b;--hred2:#e74c3c;--hgld:#d4a017;--hgld2:#f0c040;
  --hpaper:#2a1206;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;background:var(--p);font-family:'Noto Serif SC',serif;touch-action:manipulation}
.screen{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .35s}
.screen.active{opacity:1;pointer-events:all}

/* ── HOME ──────────────────────────────────────────────── */
#home{background:var(--p)}
.hst,.hsb{position:absolute;left:0;right:0;height:7px;background:repeating-linear-gradient(90deg,var(--red) 0,var(--red) 20px,transparent 20px,transparent 30px)}
.hst{top:0}.hsb{bottom:0}
.htl-wrap{display:flex;flex-direction:column;align-items:center;margin-bottom:calc(32px*var(--fs))}
.htl{font-family:'Ma Shan Zheng',cursive;font-size:calc(76px*var(--fs));color:var(--ink);letter-spacing:10px;line-height:1}
.hrl{width:64px;height:2px;background:var(--red);margin:12px auto}
.hsu{font-size:calc(16px*var(--fs));color:var(--im);letter-spacing:5px}
/* Two mode cards on home — side by side */
.home-cards{display:flex;flex-direction:row;gap:16px;width:min(92vw,500px)}
.mode-card{border-radius:14px;padding:calc(24px*var(--fs)) calc(12px*var(--fs));cursor:pointer;transition:transform .12s,box-shadow .12s;position:relative;overflow:hidden;border:none;flex:1;text-align:center;display:flex;flex-direction:column;align-items:center;gap:14px}
.mode-card:active{transform:scale(.97)}
.mode-card-literary{background:var(--p2);border:1.5px solid rgba(28,16,8,.18);box-shadow:0 4px 24px rgba(28,16,8,.12)}
.mode-card-history{background:linear-gradient(155deg,#9b2e00 0%,#6b1e00 100%);border:1.5px solid #c04010;box-shadow:0 4px 28px rgba(155,46,0,.3)}
.mode-card-history::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(45deg,transparent,transparent 18px,rgba(212,160,23,.04) 18px,rgba(212,160,23,.04) 19px);pointer-events:none}
.mc-icon{font-size:calc(52px*var(--fs));flex-shrink:0}
.mc-text{display:flex;flex-direction:column;gap:6px;position:relative;z-index:1}
.mc-title{font-family:'Ma Shan Zheng',cursive;letter-spacing:4px;line-height:1.2}
.mc-sub{letter-spacing:1px;line-height:1.5}
.mode-card-literary .mc-title{font-size:calc(28px*var(--fs));color:var(--ink)}
.mode-card-literary .mc-sub{font-size:calc(13px*var(--fs));color:var(--im)}
.mode-card-history .mc-title{font-size:calc(28px*var(--fs));color:var(--hgld2)}
.mode-card-history .mc-sub{font-size:calc(13px*var(--fs));color:rgba(240,192,64,.6)}
.home-settings{font-size:calc(16px*var(--fs));color:var(--im);cursor:pointer;letter-spacing:3px;padding:14px;margin-top:4px;text-align:center}

/* ── GAME (LITERARY) ────────────────────────────────────── */
#game{background:var(--p);justify-content:flex-start}
.gib{position:absolute;inset:0;background-size:cover;background-position:center;background-color:#c8b89a;opacity:.09;filter:sepia(70%) saturate(.5);transition:background-image .6s}
.gvg{position:absolute;inset:0;background:radial-gradient(ellipse at center,transparent 25%,rgba(242,232,213,.72) 100%)}
.gln{position:absolute;inset:0;pointer-events:none;background-image:repeating-linear-gradient(90deg,rgba(28,16,8,.035) 0,rgba(28,16,8,.035) 1px,transparent 1px,transparent 55px)}
.gbt,.gbb{position:absolute;left:0;right:0;height:4px;background:rgba(28,16,8,.12)}
.gbt{top:0}.gbb{bottom:0}

/* ── GAME (HISTORY) ─────────────────────────────────────── */
#game-history{background:var(--hbg);justify-content:flex-start}
.hgib{position:absolute;inset:0;background-size:cover;background-position:center;background-color:#1c0a04;opacity:.14;filter:sepia(100%) saturate(.6) hue-rotate(330deg);transition:background-image .6s}
.hgvg{position:absolute;inset:0;background:radial-gradient(ellipse at center,transparent 20%,rgba(26,10,4,.82) 100%)}
/* Dragon scale pattern overlay */
.hgpat{position:absolute;inset:0;pointer-events:none;background-image:repeating-linear-gradient(30deg,transparent,transparent 22px,rgba(212,160,23,.04) 22px,rgba(212,160,23,.04) 23px),repeating-linear-gradient(150deg,transparent,transparent 22px,rgba(212,160,23,.03) 22px,rgba(212,160,23,.03) 23px)}
.hgbt,.hgbb{position:absolute;left:0;right:0;height:4px;background:linear-gradient(90deg,transparent,var(--hgld),transparent)}
.hgbt{top:0}.hgbb{bottom:0}
/* Corner ornaments */
#game-history::before,#game-history::after{content:'❖';position:absolute;font-size:22px;color:rgba(212,160,23,.3);z-index:3}
#game-history::before{top:12px;left:14px}
#game-history::after{top:12px;right:14px}

/* ── SHARED GAME INNER ───────────────────────────────────── */
.gin{position:relative;z-index:2;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:space-between;padding:20px 24px 24px}
.tpb{width:100%;display:flex;align-items:center;justify-content:space-between}
/* Literary category tags */
.ctg{font-size:calc(20px*var(--fs));font-weight:700;letter-spacing:3px;padding:6px 16px;border-radius:3px;border:1.5px solid currentColor}
.tp{color:var(--grn);background:var(--gs)}.ti{color:var(--red);background:var(--rs)}.tv{color:var(--gld);background:var(--gl)}
/* History category tag */
.th{color:var(--hgld2);background:rgba(212,160,23,.15);border-color:var(--hgld)}
/* History era badge variants */
.th-qin{color:#e8c46a;background:rgba(80,20,0,.5);border-color:#c07820}
.th-han{color:#f0d080;background:rgba(60,30,0,.5);border-color:#b08020}
.th-three{color:#e07060;background:rgba(80,10,10,.5);border-color:#c03020}
.th-jin{color:#c0a060;background:rgba(50,30,10,.5);border-color:#907030}
.th-sui{color:#80c0a0;background:rgba(10,40,30,.5);border-color:#406050}
.th-tang{color:#f0c040;background:rgba(60,40,0,.5);border-color:#c09020}
.th-song{color:#80b0e0;background:rgba(10,30,60,.5);border-color:#3060a0}
.th-yuan{color:#c080e0;background:rgba(40,10,60,.5);border-color:#8030a0}
.th-ming{color:#e08040;background:rgba(60,20,0,.5);border-color:#a04010}
.th-qing{color:#80d0c0;background:rgba(0,40,40,.5);border-color:#208060}
.th-modern{color:#d0a0a0;background:rgba(60,10,10,.5);border-color:#903030}
.th-spring{color:#a0d080;background:rgba(20,50,10,.5);border-color:#508030}
.th-war{color:#d0a060;background:rgba(60,30,0,.5);border-color:#905020}
.th-general{color:var(--hgld2);background:rgba(212,160,23,.15);border-color:var(--hgld)}
/* Streak */
.skb{display:flex;flex-direction:column;align-items:center;gap:2px}
.sk-main{display:flex;align-items:center;gap:7px;font-size:calc(22px*var(--fs));font-weight:700;color:var(--ink)}
.sk-main-h{display:flex;align-items:center;gap:7px;font-size:calc(22px*var(--fs));font-weight:700;color:var(--hgld2)}
.sk-best{font-size:calc(14px*var(--fs));color:var(--im);letter-spacing:1px}
.sk-best-h{font-size:calc(14px*var(--fs));color:rgba(240,192,64,.5);letter-spacing:1px}
.gbtn{background:none;border:none;cursor:pointer;font-size:calc(26px*var(--fs));opacity:.32;padding:8px}
.gbtn:active{opacity:.7}
.hmbtn{opacity:.45;padding:6px}
/* Question area */
.qar{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;width:100%;text-align:center;padding:0 16px}
.qsr{font-size:calc(20px*var(--fs));color:rgba(28,16,8,0.55);letter-spacing:4px;margin-bottom:18px}
.qsr-h{font-size:calc(20px*var(--fs));color:rgba(240,192,64,.55);letter-spacing:4px;margin-bottom:18px}
.qtx{font-family:'Ma Shan Zheng',cursive;font-size:calc(50px*var(--fs));color:var(--ink);line-height:1.65;letter-spacing:5px}
.qtx-h{font-family:'Ma Shan Zheng',cursive;font-size:calc(46px*var(--fs));color:#f0e0c0;line-height:1.65;letter-spacing:4px}
.blk{display:inline-block;color:var(--red);min-width:calc(54px*var(--fs));text-align:center}
.blk-h{display:inline-block;color:var(--hgld2);min-width:calc(54px*var(--fs));text-align:center}
/* Answer grid */
.agd{width:100%;display:grid;grid-template-columns:1fr 1fr;gap:13px;max-width:700px}
/* Literary answer buttons */
.abt{background:rgba(255,255,255,.88);border:1.5px solid var(--bd);border-radius:var(--r);font-family:'Ma Shan Zheng',cursive;font-size:calc(50px*var(--fs));color:var(--ink);padding:calc(14px*var(--fs)) 10px;cursor:pointer;box-shadow:0 2px 10px var(--sh);transition:transform .1s;min-height:calc(86px*var(--fs));display:flex;align-items:center;justify-content:center}
.abt:active{transform:scale(.95)}
.abt.ok{background:var(--gs);border-color:var(--grn);color:var(--grn);animation:pop .35s ease}
.abt.no{background:var(--rs);border-color:var(--red);color:var(--red);animation:shk .4s ease}
/* History answer buttons */
.abt-h{background:rgba(45,18,6,.85);border:1.5px solid rgba(212,160,23,.35);border-radius:var(--r);font-family:'Ma Shan Zheng',cursive;font-size:calc(44px*var(--fs));color:#f0e0c0;padding:calc(14px*var(--fs)) 10px;cursor:pointer;box-shadow:0 2px 14px rgba(0,0,0,.4);transition:transform .1s;min-height:calc(86px*var(--fs));display:flex;align-items:center;justify-content:center}
.abt-h:active{transform:scale(.95)}
.abt-h.ok{background:rgba(30,70,30,.85);border-color:#4caf50;color:#81c784;animation:pop .35s ease}
.abt-h.no{background:rgba(80,15,15,.85);border-color:var(--hred2);color:var(--hred2);animation:shk .4s ease}

@keyframes pop{0%{transform:scale(1)}45%{transform:scale(1.08)}100%{transform:scale(1)}}
@keyframes shk{0%,100%{transform:translateX(0)}25%{transform:translateX(-10px)}75%{transform:translateX(10px)}}

/* ── MEANING PANEL ──────────────────────────────────────── */
.mpn{position:absolute;inset:0;z-index:10;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 36px;text-align:center;opacity:0;pointer-events:none;transition:opacity .3s}
.mpn.show{opacity:1;pointer-events:all}
/* Literary meaning panel */
.mpn-lit{background:rgba(20,10,4,.87)}
/* History meaning panel */
.mpn-his{background:rgba(10,4,2,.92);border-top:2px solid rgba(212,160,23,.3);border-bottom:2px solid rgba(212,160,23,.3)}
.mpt{font-size:calc(54px*var(--fs));margin-bottom:18px}
.mph{font-family:'Ma Shan Zheng',cursive;font-size:calc(38px*var(--fs));color:var(--p2);letter-spacing:5px;line-height:1.65;margin-bottom:14px}
.mph .hl{color:#e8c46a}
.mph-h{font-family:'Ma Shan Zheng',cursive;font-size:calc(36px*var(--fs));color:#f0e0c0;letter-spacing:4px;line-height:1.65;margin-bottom:14px}
.mph-h .hl{color:var(--hgld2)}
.mpb{font-size:calc(18px*var(--fs));color:rgba(242,232,213,.42);letter-spacing:3px;margin-bottom:20px}
.mpb-h{font-size:calc(18px*var(--fs));color:rgba(212,160,23,.45);letter-spacing:3px;margin-bottom:20px}
.mpe{font-size:calc(22px*var(--fs));color:rgba(242,232,213,.82);line-height:1.65;max-width:520px}
.mpe-h{font-size:calc(21px*var(--fs));color:rgba(240,224,192,.8);line-height:1.65;max-width:520px}

/* ── RECORD BANNER ──────────────────────────────────────── */
.rec{position:absolute;top:80px;left:50%;transform:translateX(-50%);z-index:20;font-family:'Ma Shan Zheng',cursive;font-size:calc(26px*var(--fs));padding:12px 28px;border-radius:40px;letter-spacing:3px;opacity:0;pointer-events:none;transition:opacity .4s;white-space:nowrap}
.rec-lit{background:var(--ink);color:#e8c46a}
.rec-his{background:linear-gradient(90deg,#2d1206,#3d1a08);color:var(--hgld2);border:1px solid rgba(212,160,23,.4)}
.rec.show{opacity:1}

/* ── MILESTONE ──────────────────────────────────────────── */
#milestone{background:var(--p)}
#milestone-history{background:var(--hbg)}
#milestone-history::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(45deg,transparent,transparent 30px,rgba(212,160,23,.03) 30px,rgba(212,160,23,.03) 31px)}
.msc{background:var(--p2);border:1.5px solid rgba(28,16,8,.18);border-radius:3px;padding:calc(38px*var(--fs)) calc(56px*var(--fs));text-align:center;box-shadow:0 6px 40px rgba(28,16,8,.12);position:relative;z-index:1}
.msc-h{background:linear-gradient(135deg,#2d1206,#1a0a04);border:1.5px solid rgba(212,160,23,.35);border-radius:3px;padding:calc(38px*var(--fs)) calc(56px*var(--fs));text-align:center;box-shadow:0 6px 40px rgba(192,57,43,.2);position:relative;z-index:1}
.msc-h::before,.msc-h::after{content:'─── ◆ ───';display:block;color:rgba(212,160,23,.4);font-size:16px;letter-spacing:4px}
.mse{font-size:calc(78px*var(--fs));margin-bottom:14px;animation:bob 1.2s ease infinite}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-14px)}}
.msm{font-family:'Ma Shan Zheng',cursive;font-size:calc(54px*var(--fs));color:var(--ink);letter-spacing:6px;margin-bottom:8px}
.msm-h{font-family:'Ma Shan Zheng',cursive;font-size:calc(54px*var(--fs));color:var(--hgld2);letter-spacing:6px;margin-bottom:8px}
.mss{font-size:calc(20px*var(--fs));color:var(--im);letter-spacing:2px;margin-bottom:38px}
.mss-h{font-size:calc(20px*var(--fs));color:rgba(212,160,23,.6);letter-spacing:2px;margin-bottom:38px}
.msg{background:var(--ink);color:var(--p);border:none;border-radius:3px;font-family:'Ma Shan Zheng',cursive;font-size:calc(28px*var(--fs));padding:calc(14px*var(--fs)) calc(54px*var(--fs));cursor:pointer;letter-spacing:4px}
.msg-h{background:linear-gradient(90deg,#8b2000,#c0392b);color:#f0e0c0;border:1.5px solid rgba(212,160,23,.4);border-radius:3px;font-family:'Ma Shan Zheng',cursive;font-size:calc(28px*var(--fs));padding:calc(14px*var(--fs)) calc(54px*var(--fs));cursor:pointer;letter-spacing:4px}

/* ── SETTINGS ───────────────────────────────────────────── */
#settings{background:var(--p);justify-content:flex-start;align-items:flex-start;padding:36px 28px;overflow-y:auto}
.shd{width:100%;display:flex;align-items:center;gap:14px;margin-bottom:34px}
.bk{background:none;border:none;font-size:calc(28px*var(--fs));cursor:pointer;color:var(--ink);padding:8px 8px 8px 0}
.stl{font-family:'Ma Shan Zheng',cursive;font-size:calc(38px*var(--fs));color:var(--ink);letter-spacing:5px}
.sbl{width:100%;margin-bottom:30px}
.slb{font-size:calc(18px*var(--fs));color:var(--im);letter-spacing:3px;margin-bottom:14px}
.fpr{font-family:'Ma Shan Zheng',cursive;font-size:calc(50px*var(--fs));color:var(--ink);text-align:center;margin-bottom:18px;letter-spacing:5px}
.slr{display:flex;align-items:center;gap:14px}
.fsl{flex:1;-webkit-appearance:none;height:6px;border-radius:3px;background:var(--p2);outline:none;border:1px solid var(--bd)}
.fsl::-webkit-slider-thumb{-webkit-appearance:none;width:34px;height:34px;border-radius:50%;background:var(--ink);cursor:pointer}
.tgl{display:flex;flex-direction:column;gap:12px}
.tgr{display:flex;align-items:center;justify-content:space-between;background:rgba(255,255,255,.7);border-radius:var(--r);padding:calc(13px*var(--fs)) calc(18px*var(--fs));border:1.5px solid var(--bd)}
.tgn{font-size:calc(22px*var(--fs));color:var(--ink);letter-spacing:2px}
.tgsw{position:relative;width:60px;height:32px}
.tgsw input{opacity:0;width:0;height:0}
.tgtr{position:absolute;inset:0;background:#ccc;border-radius:32px;cursor:pointer;transition:background .2s}
.tgtr::before{content:'';position:absolute;width:24px;height:24px;left:4px;top:4px;border-radius:50%;background:white;transition:transform .2s}
input:checked+.tgtr{background:var(--ink)}
input:checked+.tgtr::before{transform:translateX(28px)}
.rsb{width:100%;background:none;border:1.5px solid var(--bd);border-radius:var(--r);font-family:'Noto Serif SC',serif;font-size:calc(20px*var(--fs));color:var(--im);padding:14px;cursor:pointer;letter-spacing:2px}
/* Category toggles hidden in history settings */
.cats-section{display:block}
.cats-section.hidden{display:none}
.sli{animation:sli .3s ease forwards}
@keyframes sli{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>

<!-- ╔══════════════════════════════╗ -->
<!-- ║          HOME SCREEN         ║ -->
<!-- ╚══════════════════════════════╝ -->
<div id="home" class="screen active">
  <div class="hst"></div><div class="hsb"></div>
  <div class="htl-wrap">
    <div style="font-size:calc(48px*var(--fs));margin-bottom:6px">🏮</div>
    <div class="htl">猜字乐</div>
    <div class="hrl"></div>
    <div class="hsu">经典文化益智游戏</div>
  </div>
  <div class="home-cards">
    <button class="mode-card mode-card-literary" onclick="startMode('literary')">
      <div class="mc-icon">📜</div>
      <div class="mc-text">
        <div class="mc-title">诗词成语</div>
        <div class="mc-sub">古诗词 · 成语<br>谚语短语</div>
      </div>
    </button>
    <button class="mode-card mode-card-history" onclick="startMode('history')">
      <div class="mc-icon">🏯</div>
      <div class="mc-text">
        <div class="mc-title">中国历史</div>
        <div class="mc-sub">朝代 · 名人<br>历史事件</div>
      </div>
    </button>
  </div>
  <div class="home-settings" onclick="showSettings('home')">⚙ 设置</div>
</div>

<!-- ╔══════════════════════════════╗ -->
<!-- ║      LITERARY GAME SCREEN    ║ -->
<!-- ╚══════════════════════════════╝ -->
<div id="game" class="screen">
  <div class="gib" id="gBg"></div>
  <div class="gvg"></div><div class="gln"></div>
  <div class="gbt"></div><div class="gbb"></div>
  <div class="gin">
    <div class="tpb">
      <div style="display:flex;align-items:center;gap:10px">
        <button class="gbtn hmbtn" onclick="scr('home')" aria-label="返回主页"><svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V9.5z"/><polyline points="9 21 9 12 15 12 15 21"/></svg></button>
        <div class="ctg" id="catTag">古诗词</div>
      </div>
      <div class="skb">
        <div class="sk-main">🔥 <span id="skN">0</span></div>
        <div class="sk-best">最高 <span id="bestN">0</span></div>
      </div>
      <button class="gbtn" onclick="showSettings('game')">⚙</button>
    </div>
    <div class="qar">
      <div class="qsr" id="qSrc"></div>
      <div class="qtx" id="qTx"></div>
    </div>
    <div class="agd" id="agd"></div>
  </div>
  <div class="rec rec-lit" id="recBanner"></div>
  <div class="mpn mpn-lit" id="mpn">
    <div class="mpt">✨</div>
    <div class="mph" id="mph"></div>
    <div class="mpb" id="mpb"></div>
    <div class="mpe" id="mpe"></div>
  </div>
</div>

<!-- ╔══════════════════════════════╗ -->
<!-- ║      HISTORY GAME SCREEN     ║ -->
<!-- ╚══════════════════════════════╝ -->
<div id="game-history" class="screen">
  <div class="hgib" id="hgBg"></div>
  <div class="hgvg"></div><div class="hgpat"></div>
  <div class="hgbt"></div><div class="hgbb"></div>
  <div class="gin">
    <div class="tpb">
      <div style="display:flex;align-items:center;gap:10px">
        <button class="gbtn hmbtn" style="color:#f0e0c0" onclick="scr('home')" aria-label="返回主页"><svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V9.5z"/><polyline points="9 21 9 12 15 12 15 21"/></svg></button>
        <div class="ctg th" id="hCatTag">中国历史</div>
      </div>
      <div class="skb">
        <div class="sk-main-h">🏆 <span id="hSkN">0</span></div>
        <div class="sk-best-h">最高 <span id="hBestN">0</span></div>
      </div>
      <button class="gbtn" style="opacity:.4;color:#f0e0c0" onclick="showSettings('game-history')">⚙</button>
    </div>
    <div class="qar">
      <div class="qsr-h" id="hQSrc"></div>
      <div class="qtx-h" id="hQTx"></div>
    </div>
    <div class="agd" id="hAgd"></div>
  </div>
  <div class="rec rec-his" id="hRecBanner"></div>
  <div class="mpn mpn-his" id="hMpn">
    <div class="mpt" id="hMpt">⚔️</div>
    <div class="mph-h" id="hMph"></div>
    <div class="mpb-h" id="hMpb"></div>
    <div class="mpe-h" id="hMpe"></div>
  </div>
</div>

<!-- ╔══════════════════════════════╗ -->
<!-- ║     LITERARY MILESTONE       ║ -->
<!-- ╚══════════════════════════════╝ -->
<div id="milestone" class="screen">
  <div class="msc">
    <div class="mse" id="msE">🎉</div>
    <div class="msm" id="msM">答得好！</div>
    <div class="mss" id="msS">已答对 10 题</div>
    <button class="msg" onclick="resumeGame('literary')">继续 →</button>
  </div>
</div>

<!-- ╔══════════════════════════════╗ -->
<!-- ║     HISTORY MILESTONE        ║ -->
<!-- ╚══════════════════════════════╝ -->
<div id="milestone-history" class="screen">
  <div class="msc-h">
    <div class="mse" id="hMsE">🏯</div>
    <div class="msm-h" id="hMsM">博古通今！</div>
    <div class="mss-h" id="hMsS">已答对 10 题</div>
    <button class="msg-h" onclick="resumeGame('history')">继续 →</button>
  </div>
</div>

<!-- ╔══════════════════════════════╗ -->
<!-- ║          SETTINGS            ║ -->
<!-- ╚══════════════════════════════╝ -->
<div id="settings" class="screen">
  <div class="shd">
    <button class="bk" id="bkBtn" onclick="goBack()">←</button>
    <div class="stl">设置</div>
  </div>
  <div class="sbl">
    <div class="slb">字体大小</div>
    <div class="fpr">春眠不觉晓</div>
    <div class="slr">
      <span style="font-size:20px">A</span>
      <input type="range" class="fsl" id="fsSl" min="0.65" max="1.55" step="0.05" value="1" oninput="changeFS(this.value)"/>
      <span style="font-size:33px">A</span>
    </div>
  </div>
  <div class="sbl cats-section" id="catsSection">
    <div class="slb">内容类别</div>
    <div class="tgl">
      <div class="tgr"><span class="tgn">古诗词</span><label class="tgsw"><input type="checkbox" id="tog-poem" checked onchange="saveS(event)"/><span class="tgtr"></span></label></div>
      <div class="tgr"><span class="tgn">成语</span><label class="tgsw"><input type="checkbox" id="tog-idiom" checked onchange="saveS(event)"/><span class="tgtr"></span></label></div>
      <div class="tgr"><span class="tgn">谚语短语</span><label class="tgsw"><input type="checkbox" id="tog-proverb" checked onchange="saveS(event)"/><span class="tgtr"></span></label></div>
    </div>
  </div>
  <div class="sbl"><button class="rsb" onclick="resetProgress()">重置游戏进度</button></div>
</div>

<script src="data.js"></script>
<script src="data-history.js?v=2"></script>
<script>
// ── STATE ─────────────────────────────────────────────────────
// Two independent game states
const GS = {
  literary: {queue:[],cur:null,sk:0,tot:0,ans:false},
  history:  {queue:[],cur:null,sk:0,tot:0,ans:false},
};
let currentMode = 'literary'; // which mode is active
let settingsFrom = 'home';
let milestoneTimer = null;

// ── STORAGE ───────────────────────────────────────────────────
function ls(k,v){if(v===undefined)return JSON.parse(localStorage.getItem(k)||'null');localStorage.setItem(k,JSON.stringify(v));}
function getBest(mode){return ls('yj_best_'+mode)||0;}
function saveBest(mode,n){ls('yj_best_'+mode,n);}

// ── SETTINGS ──────────────────────────────────────────────────
function loadS(){
  const s=ls('yj5')||{};
  document.documentElement.style.setProperty('--fs',s.fs||1);
  document.getElementById('fsSl').value=s.fs||1;
  document.getElementById('tog-poem').checked=s.poem!==false;
  document.getElementById('tog-idiom').checked=s.idiom!==false;
  document.getElementById('tog-proverb').checked=s.proverb!==false;
}
function saveS(e){
  const poem=document.getElementById('tog-poem').checked;
  const idiom=document.getElementById('tog-idiom').checked;
  const proverb=document.getElementById('tog-proverb').checked;
  if(!poem&&!idiom&&!proverb){
    if(e&&e.target)e.target.checked=true;
    return;
  }
  ls('yj5',{fs:parseFloat(document.getElementById('fsSl').value),poem,idiom,proverb});
}
function changeFS(v){document.documentElement.style.setProperty('--fs',v);saveS();}

function activeCats(){
  const s=ls('yj5')||{};
  const c=[];
  if(s.poem!==false)c.push('poem');
  if(s.idiom!==false)c.push('idiom');
  if(s.proverb!==false)c.push('proverb');
  return c.length?c:['poem','idiom','proverb'];
}

// ── QUEUE BUILDERS ────────────────────────────────────────────
function buildQ(mode){
  const S=GS[mode];
  let pool;
  if(mode==='literary'){
    const cats=activeCats();
    pool=Q.filter(q=>cats.includes(q.c));
  } else {
    pool=(window.QH||[]).slice();
  }
  const d1=pool.filter(q=>q.d===1).sort(()=>Math.random()-.5);
  const d2=pool.filter(q=>q.d===2).sort(()=>Math.random()-.5);
  const d3=pool.filter(q=>q.d===3).sort(()=>Math.random()-.5);
  const warmup=Math.min(30,d1.length);
  const easy=d1.slice(0,warmup);
  const d1rest=d1.slice(warmup).sort(()=>Math.random()-.5);
  const phase2=[...d1rest,...d2].sort(()=>Math.random()-.5);
  const half=Math.floor(phase2.length/2);
  const phase3=[...phase2.slice(0,half),...d3,...phase2.slice(half)];
  S.queue=[...phase3,...easy].reverse();
}

function nextQ(mode){
  const S=GS[mode];
  if(!S.queue.length)buildQ(mode);
  S.cur=S.queue.pop();
  S.ans=false;
  render(mode);
}

// ── RENDER ────────────────────────────────────────────────────
function updateStreak(mode){
  if(mode==='literary'){
    document.getElementById('skN').textContent=GS.literary.sk;
    document.getElementById('bestN').textContent=getBest('literary');
  } else {
    document.getElementById('hSkN').textContent=GS.history.sk;
    document.getElementById('hBestN').textContent=getBest('history');
  }
}

function render(mode){
  const S=GS[mode];
  const q=S.cur;
  updateStreak(mode);

  if(mode==='literary'){
    const labels={poem:'古诗词',idiom:'成语',proverb:'谚语'};
    const cls={poem:'tp',idiom:'ti',proverb:'tv'};
    const tag=document.getElementById('catTag');
    tag.textContent=labels[q.c];
    tag.className='ctg '+cls[q.c];
    document.getElementById('gBg').style.backgroundImage=`url('${q.i}')`;
    document.getElementById('qSrc').textContent=q.a;
    const qEl=document.getElementById('qTx');
    qEl.innerHTML=q.t.replace('，','，<br>').replace(`{${q.b}}`,`<span class="blk">＿</span>`);
    qEl.classList.remove('sli');void qEl.offsetWidth;qEl.classList.add('sli');
    const grid=document.getElementById('agd');
    grid.innerHTML='';
    [...q.o].sort(()=>Math.random()-.5).forEach(opt=>{
      const b=document.createElement('button');
      b.className='abt';b.textContent=opt;
      b.onclick=()=>pick(mode,opt,b);
      grid.appendChild(b);
    });
    document.getElementById('mpn').classList.remove('show');
    document.getElementById('recBanner').classList.remove('show');
  } else {
    document.getElementById('hgBg').style.backgroundImage=`url('${q.i}')`;
    document.getElementById('hQSrc').textContent=q.a;
    // Era badge
    const eraMap={
      '秦朝历史':['秦朝','th-qin'],'汉朝历史':['汉朝','th-han'],'三国历史':['三国','th-three'],
      '晋朝历史':['晋朝','th-jin'],'隋朝历史':['隋朝','th-sui'],'唐朝历史':['唐朝','th-tang'],
      '宋朝历史':['宋朝','th-song'],'元朝历史':['元朝','th-yuan'],'明朝历史':['明朝','th-ming'],
      '清朝历史':['清朝','th-qing'],'近代历史':['近代','th-modern'],'春秋历史':['春秋','th-spring'],
      '战国历史':['战国','th-war'],'中国历史':['历史','th-general'],
    };
    const [eraLabel,eraCls]=eraMap[q.a]||['历史','th-general'];
    const hTag=document.getElementById('hCatTag');
    hTag.textContent=eraLabel;
    hTag.className='ctg '+eraCls;
    const qEl=document.getElementById('hQTx');
    qEl.innerHTML=q.t.replace('，','，<br>').replace(`{${q.b}}`,`<span class="blk-h">＿</span>`);
    qEl.classList.remove('sli');void qEl.offsetWidth;qEl.classList.add('sli');
    const grid=document.getElementById('hAgd');
    grid.innerHTML='';
    [...q.o].sort(()=>Math.random()-.5).forEach(opt=>{
      const b=document.createElement('button');
      b.className='abt-h';b.textContent=opt;
      b.onclick=()=>pick(mode,opt,b);
      grid.appendChild(b);
    });
    document.getElementById('hMpn').classList.remove('show');
    document.getElementById('hRecBanner').classList.remove('show');
  }
}

// ── MEANING PANEL ─────────────────────────────────────────────
function showMeaning(mode,q){
  if(mode==='literary'){
    const hi=q.t.replace(`{${q.b}}`,`<span class="hl">${q.b}</span>`).replace(/[{}]/g,'');
    document.getElementById('mph').innerHTML=hi;
    document.getElementById('mpb').textContent=q.a;
    document.getElementById('mpe').textContent=q.e;
    document.getElementById('mpn').classList.add('show');
  } else {
    const hi=q.t.replace(`{${q.b}}`,`<span class="hl">${q.b}</span>`).replace(/[{}]/g,'');
    document.getElementById('hMph').innerHTML=hi;
    document.getElementById('hMpb').textContent=q.a;
    document.getElementById('hMpe').textContent=q.e;
    // rotate emoji
    const emojis=['⚔️','🏯','📜','🐉','🔱','🏛️'];
    document.getElementById('hMpt').textContent=emojis[Math.floor(Math.random()*emojis.length)];
    document.getElementById('hMpn').classList.add('show');
  }
}

// ── PICK ANSWER ───────────────────────────────────────────────
function pick(mode,choice,btn){
  const S=GS[mode];
  if(S.ans)return;
  S.ans=true;
  const q=S.cur;
  const gridId=mode==='literary'?'agd':'hAgd';
  if(choice===q.b){
    btn.classList.add('ok');
    S.sk++;S.tot++;
    const prev=getBest(mode);
    if(S.sk>prev){saveBest(mode,S.sk);showRecordBanner(mode,S.sk);}
    updateStreak(mode);
    showMeaning(mode,q);
    if(S.tot>0&&S.tot%10===0){setTimeout(()=>milestone(mode),2400);}
    else{setTimeout(()=>nextQ(mode),2800);}
  } else {
    btn.classList.add('no');
    S.sk=0;
    updateStreak(mode);
    setTimeout(()=>{
      [...document.getElementById(gridId).children].forEach(b=>{if(b.textContent===q.b)b.classList.add('ok');});
      setTimeout(()=>{
        showMeaning(mode,q);
        setTimeout(()=>nextQ(mode),3000);
      },1000);
    },500);
  }
}

function showRecordBanner(mode,n){
  const id=mode==='literary'?'recBanner':'hRecBanner';
  const el=document.getElementById(id);
  el.textContent=n===1?'🏅 首次连击！':`🏆 新纪录！连续答对 ${n} 题！`;
  el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),2800);
}

// ── MILESTONE ─────────────────────────────────────────────────
function milestone(mode){
  if(milestoneTimer){clearTimeout(milestoneTimer);milestoneTimer=null;}
  if(mode==='literary'){
    const msgs=['答得好！','真厉害！','继续加油！','棒极了！','了不起！'];
    const emojis=['🎉','🌟','🏆','🎊','👏'];
    const i=Math.floor(Math.random()*msgs.length);
    document.getElementById('msE').textContent=emojis[i];
    document.getElementById('msM').textContent=msgs[i];
    document.getElementById('msS').textContent=`已答对 ${GS.literary.tot} 题`;
    scr('milestone');
  } else {
    const msgs=['博古通今！','史学大家！','学识渊博！','了不起！','历史达人！'];
    const emojis=['🏯','🐉','📜','🔱','⚔️'];
    const i=Math.floor(Math.random()*msgs.length);
    document.getElementById('hMsE').textContent=emojis[i];
    document.getElementById('hMsM').textContent=msgs[i];
    document.getElementById('hMsS').textContent=`已答对 ${GS.history.tot} 题`;
    scr('milestone-history');
  }
  milestoneTimer=setTimeout(()=>resumeGame(mode),3000);
}

function resumeGame(mode){
  if(milestoneTimer){clearTimeout(milestoneTimer);milestoneTimer=null;}
  const target=mode==='literary'?'game':'game-history';
  if(!document.getElementById(target).classList.contains('active')){
    scr(target);
    nextQ(mode);
  }
}

// ── NAVIGATION ────────────────────────────────────────────────
function startMode(mode){
  currentMode=mode;
  if(mode==='history'&&(!window.QH||window.QH.length===0)){
    alert('历史题库加载失败（QH=' + (window.QH ? window.QH.length : 'undefined') + '），请刷新页面');
    return;
  }
  buildQ(mode);
  scr(mode==='literary'?'game':'game-history');
  nextQ(mode);
}

function scr(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function showSettings(from){
  settingsFrom=from;
  const isHistory=from==='game-history';
  // Show/hide category toggles based on mode
  document.getElementById('catsSection').classList.toggle('hidden',isHistory);
  const label=from==='home'?'← 返回':isHistory?'← 返回游戏':'← 返回游戏';
  document.getElementById('bkBtn').textContent=label;
  loadS();
  scr('settings');
}

function goBack(){
  scr(settingsFrom);
}

function resetProgress(){
  GS.literary.sk=0;GS.literary.tot=0;
  GS.history.sk=0;GS.history.tot=0;
  saveBest('literary',0);saveBest('history',0);
  buildQ('literary');buildQ('history');
  alert('进度已重置 ✓');
}

loadS();
</script>
</body>
